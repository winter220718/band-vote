spring.application.name=band-vote-app
server.address=0.0.0.0
server.port=${PORT:8080}
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

bandvote.db.path=${BANDVOTE_DB_PATH:data/bandvote.db}
spring.datasource.url=jdbc:sqlite:${bandvote.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
spring.datasource.hikari.maximum-pool-size=1
