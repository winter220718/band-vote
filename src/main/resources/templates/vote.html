<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>합주곡 투표</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
    <section class="card">
        <div class="page-head">
            <div>
                <p class="badge">Vote Page</p>
                <h1>Flowee 합주(공연)곡 투표</h1>
                <!-- <p class="sub-text"><strong th:text="${voterName}"></strong>님, 원하는 곡을 선택해주세요 -->
            </p>
            </div>
            <a href="/" class="secondary-btn">처음으로</a>
        </div>

        <input type="hidden" id="voterName" th:value="${voterName}">

        <form id="voteForm" class="stack-form">
            <div id="songList" class="song-grid"></div>
            <button type="submit" class="primary-btn">제출하기</button>
        </form>

        <div id="messageBox" class="message-box hidden"></div>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
